
spring.application.name=EventService

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Micrometer CloudWatch (disabled by default; enable in AWS/staging with env var)
management.metrics.export.cloudwatch.enabled=${CLOUDWATCH_ENABLED:false}
management.metrics.export.cloudwatch.namespace=${CLOUDWATCH_NAMESPACE:EventService}
management.metrics.export.cloudwatch.step=30s
management.metrics.export.cloudwatch.batch-size=20
management.metrics.export.cloudwatch.region=${AWS_REGION:us-east-1}

# Logging config: uses logback-spring.xml
logging.config=classpath:logback-spring.xml

# Datasource (H2 in-memory for local dev; override in production)
spring.datasource.url=jdbc:h2:mem:eventdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


# MyBatis configuration
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-fetch-size=100
mybatis.configuration.use-generated-keys=true

# AWS SQS Configuration
# Queue name for publishing event creation events
aws.sqs.queue-name=${AWS_SQS_EVENT_QUEUE:fila-evento-cadastrado}

# AWS SDK v2 Configuration (auto-detect credentials from environment, ~/.aws/credentials, or IAM role)
# Region can be overridden via AWS_REGION env var
spring.cloud.aws.region.static=${AWS_REGION:us-east-1}


