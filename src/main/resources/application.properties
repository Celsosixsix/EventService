
spring.application.name=EventService

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Micrometer CloudWatch (disabled by default; enable in AWS/staging with env var)
management.metrics.export.cloudwatch.enabled=${CLOUDWATCH_ENABLED:false}
management.metrics.export.cloudwatch.namespace=${CLOUDWATCH_NAMESPACE:EventService}
management.metrics.export.cloudwatch.step=30s
management.metrics.export.cloudwatch.batch-size=20
management.metrics.export.cloudwatch.region=${AWS_REGION:us-east-1}

# Logging config: uses logback-spring.xml
logging.config=classpath:logback-spring.xml

# Datasource (H2 in-memory for local dev; override in production)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}


# MyBatis configuration
mybatis.mapper-locations=classpath:repository/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-fetch-size=100
mybatis.configuration.use-generated-keys=true
mybatis.type-handlers-package=com.celso.reserva.eventservice.config

# AWS SQS Configuration
# Nome da fila FIFO para publicar eventos de criacao
aws.sqs.queue-name=${AWS_SQS_EVENT_QUEUE:fila-evento-cadastrado.fifo}

# AWS Config - credenciais explicitas via env vars (padrao do grupo)
spring.cloud.aws.region.static=${AWS_REGION:us-east-1}
custom.aws.access-key=${AWS_ACCESS_KEY_ID}
custom.aws.secret-key=${AWS_SECRET_ACCESS_KEY}
custom.aws.session-token=${AWS_SESSION_TOKEN}

# JWT Configuration (mesma chave compartilhada pelo identity-service do grupo)
app.jwt.secret=${JWT_SECRET}

# Profile - 'dev' valida JWT local, 'prod' confia em headers do API Gateway
spring.profiles.active=${PROFILE:dev}

